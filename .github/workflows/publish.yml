name: Quarto Publish (R & Custom Packages)
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.10'
          activate-environment: r-reticulate
          channels: conda-forge,defaults

      - name: Install Python dependencies via Conda
        run: |
          conda install -y -n r-reticulate -c conda-forge python=3.10 numpy pandas matplotlib polars statsmodels libexpat
        # 추가로 필요한 패키지 설치
        shell: bash -l {0}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          install.packages(c("reticulate", "knitr", "rmarkdown", "tidyverse", "NHANES", "ggplot2", "broom", "dplyr", "forcats"))
        # 추가로 필요한 패키지 설치
        shell: Rscript {0}

      - name: Render Quarto
        run: |
          conda activate r-reticulate
          export CONDA_ENV_PREFIX=$(conda info --base)/envs/r-reticulate
          export RETICULATE_PYTHON=$CONDA_ENV_PREFIX/bin/python
          export LD_LIBRARY_PATH=$CONDA_ENV_PREFIX/lib:${LD_LIBRARY_PATH:-}
          export LD_PRELOAD=$CONDA_ENV_PREFIX/lib/libexpat.so${LD_PRELOAD:+:$LD_PRELOAD}
          python -c "import pyexpat, pandas, statsmodels.api; print('Python:', __import__('sys').executable); print('Expat:', pyexpat.EXPAT_VERSION)"
          Rscript -e 'library(reticulate); use_python(Sys.getenv("RETICULATE_PYTHON"), required = TRUE); py_run_string("import pyexpat, pandas, statsmodels.api as sm\nprint(\"reticulate expat:\", pyexpat.EXPAT_VERSION)")'
          quarto render
        shell: bash -l {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
